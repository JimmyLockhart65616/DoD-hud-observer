services:
  hlds:
    image: jives/hlds:dod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./dod-server/config:/temp/config"
      - "./dod-server/mods:/temp/mods"
    ports:
      - "27016:27015/udp"
      - "27016:27015/tcp"
      - "26900:26900/udp"
    healthcheck:
      test: ["CMD-SHELL", "ps -e | grep -q hlds_linux"]
      interval: 2s
      timeout: 2s
      retries: 2
      start_period: 8s
    # +maxplayers: 12 players + 1 HLTV proxy + 1 spectator slot
    command: >
      +log on
      +rcon_password "changeme"
      +maxplayers 14
      +map dod_anzio
      +localinfo mm_gamedll marinebot/marinebot.so

  hltv:
    image: jives/hlds:dod
    depends_on:
      hlds:
        condition: service_healthy
    volumes:
      - "./dod-server/hltv.cfg:/opt/steam/hlds/hltv.cfg:ro"
    ports:
      - "27020:27020/udp"
    entrypoint: ""
    command:
      - sh
      - -c
      - |
        sleep 5
        cd /opt/steam/hlds
        export LD_LIBRARY_PATH=.
        exec ./hltv -port 27020
