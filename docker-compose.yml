# DoD HUD Observer — Standalone Data Server
#
# Runs the HUD Observer backend + frontend in Docker (for CI or isolated testing).
# For a full KTP stack (game servers + data server + HLTV proxies), use:
#   KTPInfrastructure/docker-compose.local.yml
#
# Usage:
#   docker compose up -d        # start data server
#   docker compose down         # stop
#   docker compose logs -f      # tail logs
#
# Ports:
#   3000 — React frontend (OBS browser source / watch page)
#   3001 — REST API
#   4000 — Socket.IO
#   8088 — HTTP ingest (AMXX plugin POSTs here)

services:
  data:
    build:
      context: .
      dockerfile: data-server/Dockerfile
    ports:
      - "3000:3000"
      - "3001:3001"
      - "4000:4000"
      - "8088:8088"
      - "27020:27020/udp"
      - "27021:27021/udp"
      - "27500:27500/udp"
      - "3306:3306"
    volumes:
      - "./config.yaml:/app/config.yaml:ro"
      - "mysql-data:/var/lib/mysql"


volumes:
  mysql-data:
