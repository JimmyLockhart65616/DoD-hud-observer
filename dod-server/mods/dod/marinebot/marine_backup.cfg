#
# Marine Bot external variables configuration file
#
#
# This file is designed to be viewed in a basic equiwidth text
# editor, such as Notepad. The alignments may be incorrect in
# more advanced programs, or if WordWrap is enabled.
#
# Any line begining with '#' is a comment line.
# All commented and blank lines are ignored.
#
# If you don't set a value, or set an invalid one, each command
# will use a default value. For your information these are listed
# in the comments before each command.


# Logging
# If you have the standard HL logging enabled, Marine Bot can
# print its own events into your log file. This is useful if you
# are running a server, but most people won't need this function.
# Don't try to turn this on if you don't have logging enabled,
# strange things might happen! (ie. it's untested)
#
# allowed values: yes/no
# default value is: no
mb_log "no"

# Default Skill
# This sets the default skill level of any bot added
# automatically or manually using either the menu or the
# 'recruit' command without defining a skill level. You can still
# override this by using the recruit command ingame and
# specifying a skill level. (type 'help' in the console if you
# don't know how to do this).
#
#		1 - best accuracy and quickest fire rate
#		2 - good accuracy and fast fire rate
#		3 - moderate accuracy and normal fire rate
#		4 - poor accuracy and slow fire rate
#		5 - worst accuracy and slowest fire rate
#
# allowed values: 1-5
# default value is: 3
spawn_skill "3"

# Random Skill
# If you prefer, bots can be assigned a random skill level rather
# than all using the same one (set above). If set to yes, this option
# will assign each bot a random skill level between 1 and 5 when they
# join the game.
#
# allowed values: yes/no
# default value is: no
random_skill "no"

# Reaction Time
# This sets the reaction time for all bots. Bots won't react after
# seeing something until this time has elapsed. This is in seconds,
# and can be any value between the limits (e.g. 1.5 or 3.8).
# In MB 0.9 and above, this will be modified depending on the skill of
# the bot, with more skillful bots reacting faster.
#
# allowed values: 0.1-5
# default value is: 0.5
reaction_time "0.5"

# Auto Team Balancing
# Marine Bot can automatically check the numbers on each team and
# move bots between them to even the game up. This value sets how
# often, in seconds, that this check will be made. Also, turning
# this feature on will force bots to join the smaller team whenever
# they are automatically added to the game. A value of 0 will
# disable this feature. You can always manually perform this
# check ingame using the menu or the 'balanceteams' command.
#
# allowed values: 0, 30-3600
# default value is: 30
auto_balance "30"

# Minimum Bots
# This setting only works on a Dedicated Server. It defines the
# minimum number of bots to be present in the game. This number
# of bots will never be kicked, no matter how many humans join.
# Note a value of 31 will prevent any bots ever being kicked to
# make room for humans.
# 
# allowed values 0-31
# default value is: 2
min_bots "2"

# Maximum Bots
# This setting only works on a Dedicated Server. It defines the
# maximum number of bots to be present, so this will be the
# number playing when there are no humans. It is a good idea to
# set this to 2 less than the maximum players on your server, so
# the server will be almost full yet still have room for humans
# to join. A value of 0 means bots will never automatically join.
#
# allowed values: 0-31
# default value is: 6
max_bots "6"

# Info Sending
# This option sets the number of seconds between the sending of
# info messages to the Dedicated Server screen or server log,
# 0 is means no messages get sent. Note this only works if you
# are running a Dedicated Server or have logging enabled.
# 
# allowed values: 0, 30-3600
# default value is: 150
send_info "150"

# Marine Bot Presentation Message
# This option sets the number of seconds between successive
# sending of the Marine Bot presentation message to clients on a
# Dedicated Server. The presentation message is the green and red
# text informing clients that the server is running Marine Bot.
# Setting this to 0 will prevent the message from being sent.
# Caution should be used with small values as although this message
# uses only a small amount of bandwidth, a large number of clients 
# coupled with a low delay time could cause lag problems.
#
# allowed values: 0, 30-3600
# default value is: 210
send_presentation "210"

# HUD text line length
# This setting only works on a Listen Server and allows you to
# specify the maximum length of a line of HUD text that Marine Bot
# messaging system will try to maintain. Useful when you run the game
# in low screen resolution where long text line may not be readable.
# Or when the game has hardcoded limit that in case of exceeding would
# lead to a crash.
#
# allowed values: 60-140
# default value is: 80
hudtext_line_length "80"

# Bot Muting
# If you find the Bots yelling 'Area Clear' and other voice messages
# a bit annoying, you can turn it off here. Yes means they won't use
# voice messages.
#
# allowed values: yes/no
# default value is: no
dont_speak "no"

# Bot Chat Muting
# If you find the Bots using 'say', 'say_team' messages a
# bit annoying, you can turn it off here. Yes means they won't
# send any messages.
#
# allowed values: yes/no
# default value is: no
dont_chat "no"

# Bot Chat Partial Muting
# This setting will limit the use of 'say', 'say_team' messages
# for the Bots so that they will use it only when it is
# directed at a human player. Yes means they won't send messages
# like "Cease fire" to each other. This is especially useful for
# public servers to keep the chat open for the gamers.
#
# allowed values: yes/no
# default value is: no
dont_chat_tobots "no"

# Tagged Names
# If turned on, all bots will have the [MB] tag at the start of
# their name ingame. The actual names can be found in the file
# marine_dog-tags.txt in your marinebot folder.
#
# allowed values: yes/no
# default value is: yes
rich_names "yes"

# Custom Headshot Percentage
# This setting determines if you want bots to use the default hard-coded
# decision to aim for a headshots or you override it by setting your own
# percentual chance to aim for a headshot. Setting it to value -1 will
# disable this option and the bots will use default hard-coded chance based
# on their aiming skill level. The better the aiming skill is the more often
# will the bot aim for a headshot. Any value between 0 and 100 will set exact
# percentual chance for all bots no matter their aiming skill level or whether
# they are using sniper rifle or not. Where 0 means no headshots at all
# and 100 means always aim for the headshot.
#
# allowed values: -1, 0-100
# default value is: -1
custom_headshot_percentage "-1"

# Grenade Use Percentage
# This setting determines how much will the bot try to use a grenade
# against the enemy. If the bot runs out of ammunition for the main weapon
# then there is 35 added to listed value. Means that the bot will try to use
# the grenade a lot more than when he had enough ammo. Setting it to value -1
# will disable the decision making so the bots will never use the grenades.
# Any value between 0 and 100 will set exact percentage chance for all bots.
# This doesn't mean bots will always throw all grenades they have. Most of the
# time once the bot throws a grenade he will keep the other grenade/s for
# another battle. Also there is a hard coded period of time on the check whether
# to use a grenade. Where the best skilled bots will try to use a grenade
# significantly more often than the worst skilled bots.
#
# allowed values: -1, 0-100
# default value is: 25
grenade_use_percentage "25"


# Custom Recruiting
# In this section you can set custom bots to join at the beginning
# of the game. You don't need to use this section unless, for
# example, you always want a bot called Fred to join, or one bot
# with skill 5 and another with skill 1.
#
# The syntax is:
# recruit 
#    addmarine <space> optional list of arguments separated by spaces
#    addmarine <space> optional list of arguments separated by spaces
#    ...
# recruit-end
#
# The arguments can be set as a key <space> "value"
# Their order is not important.
# Missing agruments except skill will be taken randomly.
# keys are: team, class, skill, name
#
# 'team' options - "allies" to Allied team
#		   "axis" to Axis team
#
# The 'class' key is a number that refers to the setups built into DOD.
#
# The 'skill' options are already explained above under the
# 'Default Skill' section
#
# 'name' can be up to 27 characters long if the'rich_names' is
# set to yes. Else it can be up to 31 characters long.
#
# This is an example of whole custom recruit command:
#
# 	addmarine team "allies" class "1" skill "5" name "Ed Rogers"
#
#
# This will spawn 15 bots keeping teams balanced
#
# The recruiting has to deal with limited classes on British team therefore
# there are just first 5 classes used. If you want even the other classes then
# you can either create a map specific configuration files
# or delete the class key and let it generate randomly.
recruit
	addmarine team "allies" class "1"
	addmarine team "axis" class "1"
	addmarine team "allies" class "1"
	addmarine team "axis" class "1"
	addmarine team "allies" class "1"
	addmarine team "axis" class "1"
	addmarine team "allies" class "2"
	addmarine team "axis" class "2"
	addmarine team "allies" class "3"
	addmarine team "axis" class "3"
	addmarine team "allies" class "4"
	addmarine team "axis" class "4"
	addmarine team "allies" class "5"
	addmarine team "axis" class "5"
	addmarine team "axis"
# If you would prefer the extra bot to join the allied team to
# begin with, then change the above line to:
#	addmarine team "allies"
# Either way around bots will move to balance the teams after
# a few seconds, as set by the auto balancing section above.
recruit-end


# Binding
# When you run Marine Bot, your END key is automatically bound to
# the MB menu. If you would rather it was bound to a different
# key, or that it wasn't bound at all, you can change it here.
# Note that when this command is performed, it is also saved in
# your 'config.cfg' file in your Day of Defeat directory as well,
# so you will have to edit that too.
#
#
# The syntax is:
# commands
#    addcommand <space> "the command enclosed in double quotes"
#    addcommand <space> "another command enclosed in double quotes"
#    ...
# commands-end
#
# Half-Life key bindings looks like this:
# bind <space> key <space> command
#
# For example:
# bind END marinebotmenu
# will bind Marine Bot menu to the END key
#
# If you want to bind multi word command then you must enclose it to
# the round brackets. Please note that this will work only here.
# Half-Life key binding doesn't use brackets, but double quotes for
# this purpose. Anyway this is an example how to do it here
# in Marine Bot configuration file:
#
#   addcommand "bind DEL (say_team Help me capture this flag)"
#
#
# You can add any valid Half-Life command here not only key bindings.
# However the configuration file isn't executed on every map change.
# If you wanted so then you'd have to create a map specific
# configuration file for each of the maps on your 'mapcycle.txt' list.
# Please consult the FAQ for the details on how to do it.
#
commands
	addcommand "bind END marinebotmenu"
commands-end
